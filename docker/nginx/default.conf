server {
    listen 80;

    # FastAPI gateway
    location /api/ {
        proxy_pass http://gateway:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
    }

    # LangGraph SDK compatibility
    location /api/langgraph/ {
        proxy_pass http://gateway:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
    }
}
